<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: var(--color-just-black);
        }

        body {
            margin: 0;
        }

        .wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .boxes-container {
            display: flex;
            width: 100%;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .box {
            width: 25vw;
            height: 25vw;
            min-width: 200px;
            padding: 10px;
            border: 2px dashed var(--color-surface50);
            margin: 0.2rem;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .box-content {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background-position: center;
            background-size: cover;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            position: relative;
        }

        .modal {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: transparent;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
        }

        .modal .content {
            height: 90vh;
            aspect-ratio: 4/5;
            position: relative;
        }

        .modal .content .box-content {
            background-color: var(--color-blue);
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0;
        }

        .box-content.one {
            background-image: url("https://assets.codepen.io/16327/portrait-image-14.jpg");
        }

        .box-content.two {
            background-image: url("https://assets.codepen.io/16327/portrait-image-1.jpg");
        }

        .box-content.three {
            background-image: url("https://assets.codepen.io/16327/portrait-image-12.jpg");
        }

        .box-content.four {
            background-image: url("https://assets.codepen.io/16327/portrait-image-2.jpg");
        }

        .box-content.five {
            background-image: url("https://assets.codepen.io/16327/portrait-image-4.jpg");
        }

        .box-content.six {
            background-image: url("https://assets.codepen.io/16327/portrait-image-8.jpg");
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="boxes-container">
            <div class="box">
                <div class="box-content one"></div>
            </div>
            <div class="box">
                <div class="box-content two"></div>
            </div>
            <div class="box">
                <div class="box-content three"></div>
            </div>
            <div class="box">
                <div class="box-content four"></div>
            </div>
            <div class="box">
                <div class="box-content five"></div>
            </div>
            <div class="box">
                <div class="box-content six"></div>
            </div>
        </div>
    </div>
    <div class="modal">
        <div class="overlay"></div>
        <div class="content"></div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/Flip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
    console.clear();

    gsap.registerPlugin(Flip);

    const modal = document.querySelector(".modal");
    const modalContent = modal.querySelector(".content");
    const modalOverlay = modal.querySelector(".overlay");
    const boxes = gsap.utils.toArray(".boxes-container .box");
    const boxesContent = gsap.utils.toArray(".box-content");
    let boxIndex = undefined;

    boxesContent.forEach((box, i) => {
        box.addEventListener("click", () => {
            if (boxIndex !== undefined) {
                const state = Flip.getState(box);
                boxes[boxIndex].appendChild(box);
                boxIndex = undefined;
                gsap.to([modal, modalOverlay], {
                    autoAlpha: 0,
                    ease: "power1.inOut",
                    duration: 0.35
                });
                Flip.from(state, {
                    duration: 0.7,
                    ease: "power1.inOut",
                    absolute: true,
                    onComplete: () => gsap.set(box, { zIndex: "auto" })
                });
                gsap.set(box, { zIndex: 1002 });
            } else {
                const state = Flip.getState(box);
                modalContent.appendChild(box);
                boxIndex = i;
                gsap.set(modal, { autoAlpha: 1 });
                Flip.from(state, {
                    duration: 0.7,
                    ease: "power1.inOut"
                });
                gsap.to(modalOverlay, { autoAlpha: 0.65, duration: 0.35 });
            }
        });
    });

</script>

</html>
