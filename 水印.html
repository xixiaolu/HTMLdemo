    function addWatchermark(imageSrc, watermarkText) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const image = new Image();
        image.src = imageSrc;
        image.onload = ()=>{
            canvas.width = image.width;
            const eight = image.height;
            ctx.drawImage(image, 0, 0);
            ctx.font = '30px Arial';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillText(watermarkText, image.width - ctx.measureText(watermarkText).width - 10, eight - 10);
            const watermarkedImage = document.getElementById('watermarkedImage');
            watermarkedImage.src = canvas.toDataURL('image/png')
        }
    }
    const imageSrc = document.getElementById('imageSrc').src;
    console.log('-----',imageSrc)
    addWatchermark(imageSrc, '我是水印');
