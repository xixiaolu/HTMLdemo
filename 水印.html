    function createWatermarkSVG(text){
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
            <text x="50%" y="50%" dy="0.35em" dominant-baseline="middle" text-anchor="middle" fill="rgba(0, 0, 0, 0.5)" font-size="20" transform="rotate(-30 100 100)">${text}</text></svg>`;
        return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
    }
    const watermark = createWatermarkSVG('我是svg水印');
