<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 30%;
            margin: 0 auto;
        }
                /* 刷新按钮区域 */
        .refresh-btn {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            position: relative;
        }

        /* 按钮内的图标 */
        .refresh-icon {
            width: 36px;
            height: 36px;
            border: 4px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        /* 按钮外围的装饰圈 */
        .refresh-btn::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            border: 1px dashed #60a5fa;
            border-radius: 50%;
            animation: spin-reverse 10s linear infinite;
        }
                /* 动画定义 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div>
            <img src="https://picsum.photos/200/300?id=1" alt="">
        </div>
        <div>
            <img src="https://picsum.photos/200/300?id=2" alt="">
        </div>
        <div>
            <img src="https://picsum.photos/200/300?id=3" alt="">
        </div>
        <div>
            <img src="https://picsum.photos/200/300?id=4" alt="">
        </div>
    </div>
    <div class="refresh-btn">
        <div class="refresh-icon"></div>
    </div>
</body>
<script>
    const ob = new IntersectionObserver(
        entries => {
            for(let entry of entries){
                if(entry.isIntersecting){
                    console.log('进入视口');
                    fn();
                }
            }
        },
        {
            root : null,  // 默认为视口
            threshold: 0.5,  // 阈值率为0，表示只要元素进入视口就触发回调
        }
    );
    const refreshBtn = document.querySelector('.refresh-btn');
    ob.observe(refreshBtn);

    // 模拟加载更多图片
    function createImg(id){
        const div = document.createElement('div');
        const img = document.createElement('img');
        img.src = `https://picsum.photos/200/300?id=${id}`;
        div.appendChild(img);
        return div;
    }
    // 触发加载图片
    function fn(){
        for(let i = 0; i < 10 ; i++){
            const img = createImg(i);
            document.querySelector('.box').appendChild(img);
        }
    }
</script>
</html>
