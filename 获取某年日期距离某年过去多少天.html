<script>
    let year = 2022;
    let month = 10;
    let day = 27;
    const dayOfYear = (date)=>{
        return Math.floor((date - new Date(date.getFullYear(),0,0)) / 1000 / 60 / 60 / 24 )
    }
    let data = dayOfYear(new Date(year, month - 1, day))
    console.log('11111',data)
    document.querySelector('body').innerHTML = `${year}年${month}月${day}日是${year}年的第${data}天`
</script>
